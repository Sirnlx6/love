<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
    color: white;
}

/* النص */
#text {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 50px;
}

/* القلب الكبير */
.heart {
    position: absolute;
    top: 60%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100px;
    height: 90px;
    animation: beat 1s infinite;
}

.heart:before,
.heart:after {
    content: "";
    position: absolute;
    width: 50px;
    height: 80px;
    background: red;
    border-radius: 50px 50px 0 0;
}

.heart:before {
    left: 50px;
    transform: rotate(-45deg);
    transform-origin: 0 100%;
}

.heart:after {
    left: 0;
    transform: rotate(45deg);
    transform-origin: 100% 100%;
}

@keyframes beat {
    0%,100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.2); }
}

/* قلوب تطلع */
.small-heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-600px); opacity: 0; }
}

/* نجوم */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: twinkle 2s infinite;
}

@keyframes twinkle {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}

</style>
</head>

<body>

<div id="text"></div>
<div class="heart"></div>

<script>
// كتابة النص حرف حرف
let message = "احبك يا حصة ❤️";
let i = 0;

function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 100);
    }
}
typeWriter();

// نجوم
for(let i=0; i<120; i++){
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random()*100 + "%";
    star.style.left = Math.random()*100 + "%";
    document.body.appendChild(star);
}

// قلوب تطلع
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "small-heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100 + "%";
    heart.style.bottom = "0px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 4000);
}, 300);

</script>

</body>
</html>
